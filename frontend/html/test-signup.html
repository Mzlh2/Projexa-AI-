<!DOCTYPE html>
<html>
<head>
    <title>Test Signup</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .container { max-width: 400px; }
        input, button { display: block; width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background: green; color: white; cursor: pointer; }
        #result { margin-top: 20px; padding: 10px; background: #f0f0f0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test Signup</h1>
        
        <form id="signupForm">
            <input type="text" id="roll_number" placeholder="Roll Number" value="2024099" required>
            <input type="email" id="email" placeholder="Email" value="newstudent@test.com" required>
            <input type="text" id="full_name" placeholder="Full Name" value="New Student" required>
            <input type="tel" id="phone" placeholder="Phone" value="9876543210" required>
            <input type="password" id="password" placeholder="Password" value="TestPass123" required>
            <button type="submit">Sign Up</button>
        </form>
        
        <div id="result"></div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('roll_number', document.getElementById('roll_number').value);
            formData.append('email', document.getElementById('email').value);
            formData.append('full_name', document.getElementById('full_name').value);
            formData.append('phone', document.getElementById('phone').value);
            formData.append('password', document.getElementById('password').value);
            
            try {
                const res = await fetch('../../backend/api/signup.php', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await res.json();
                document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch(error) {
                document.getElementById('result').innerHTML = 'Error: ' + error.message;
            }
        });
    </script>
</body>
</html>
